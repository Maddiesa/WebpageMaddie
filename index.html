<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="northbound.css" />
    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body style="background-color: rgb(127, 148, 92); margin: 0">
    <!-- HERO SECTION -->
    <div style="position: relative; width: 100%">
      <!-- background -->
      <img
        src="/images/greenery4.jpg"
        alt="greenery background"
        style="width: 100%; display: block"
      />

      <!-- logo, works -->
      <img
        src="/images/NORTHBOUND.png"
        alt="Northbound logo"
        class="hero-logo"
      />

      <!-- cafe & bakery text, correct -->
      <h1 class="hero-subtitle">café & bakery</h1>
    </div>

    <!-- BUTTON kinda works men den ska inte va kvar sen -->
    <button
      type="button"
      class="date-button"
      onclick="document.getElementById('demo').innerHTML = Date()"
    >
      Click me to display Date and Time.
    </button>

    <!-- CONTACT IMAGE -->
    <img src="/images/contact.jpg" alt="contact image" class="contact-img" />

    <!-- DATE OUTPUT -->
    <p
      id="demo"
      style="
        text-align: center;
        font-family: &quot;Zalando Sans Expanded&quot;, sans-serif;
        color: aliceblue;
      "
    ></p>
  </body>
</html>
