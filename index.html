<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Northbound</title>

    <link rel="stylesheet" href="northbound.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HERO SECTION -->
    <section class="hero">
      <img
        src="images/greenery4.jpg"
        alt="greenery background"
        class="hero-bg"
      />

      <img
        src="images/Artboard 1.png"
        alt="lace decoration"
        class="hero-lace"
      />

      <img
        src="images/NORTHBOUND.png"
        alt="Northbound logo"
        class="hero-logo"
      />

      <h1 class="hero-subtitle">café & bakery</h1>
    </section>

    <!-- DRINKS + CONTACT ROW -->
    <section class="content-row">
      <!-- DRINKS -->
      <div class="tea-container">
        <img src="images/teapour.jpg" alt="Tea pouring" class="tea-img" />
        <h2 class="drinks-title">DRINKS</h2>
      </div>

      <!-- CONTACT -->
      <img src="images/contact.jpg" alt="contact image" class="contact-img" />
    </section>
  </body>
</html>
