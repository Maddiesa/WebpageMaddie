<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="northbound.css" />

    <meta charset="UTF-8" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body style="background-color: rgb(127, 148, 92); margin: 0">
    <!-- HERO SECTION -->
    <div style="position: relative; width: 100%">
      <!-- background -->
      <img
        src="/images/greenery4.jpg"
        alt="greenery background"
        style="width: 100%; display: block"
      />

      <!-- logo -->
      <img
        src="/images/NORTHBOUND.png"
        alt="Northbound logo"
        style="
          position: absolute;
          top: 45%;
          left: 50%;
          transform: translate(-50%, -50%);
          width: 800px;
          max-width: 90%;
        "
      />

      <!-- cafe & bakery text -->
      <h1
        style="
          position: absolute;
          top: 78%;
          left: 50%;
          transform: translateX(-50%);
          margin: 0;
          color: rgb(206, 189, 155);
          font-family: &quot;Zalando Sans Expanded&quot;, Arial, sans-serif;
          font-size: 25px;
          text-align: center;
        "
      >
        café & bakery
      </h1>
    </div>

    <!-- BUTTON -->
    <button
      type="button"
      style="
        display: block;
        margin: 20px auto;
        font-family: &quot;Zalando Sans Expanded&quot;, sans-serif;
        font-size: 20px;
        color: rgb(46, 3, 3);
        background-color: rgb(238, 164, 17);
        border: none;
        padding: 10px 20px;
        cursor: pointer;
      "
      onclick="document.getElementById('demo').innerHTML = Date()"
    >
      Click me to display Date and Time.
    </button>

    <!-- CONTACT IMAGE -->
    <img
      src="/images/contact.jpg"
      alt="contact image"
      style="display: block; margin: 30px auto; width: 400px; height: auto"
    />

    <!-- DATE OUTPUT -->
    <p
      id="demo"
      style="
        text-align: center;
        font-family: &quot;Zalando Sans Expanded&quot;, sans-serif;
        color: aliceblue;
      "
    ></p>
  </body>
</html>
