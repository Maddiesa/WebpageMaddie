<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northbound</title>

    <link rel="stylesheet" href="northbound.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="page-container">
    <!-- HERO SECTION -->
    <section class="hero">
      <img
        src="images/greenery4.jpg"
        alt="greenery background"
        class="hero-bg"
      />
      <img
        src="images/compactLace.png"
        alt="lace decoration"
        class="hero-lace"
      />
      <img
        src="images/KuhlmansNorthMiddle.png"
        alt="Northbound logo"
        class="hero-logo"
      />
      <h1 class="hero-subtitle">café & bakery</h1>
    </section>

    <!-- MENU SECTION -->
    <section class="menu-section">
      <div class="content-row">
        <a href="drinks.html" class="image-card">
          <img src="images/teapour.jpg" class="card-img" />
          <h2 class="card-title">DRINKS</h2>
        </a>
        <a href="brekkie.html" class="image-card">
          <img src="images/syrniki.jpg" class="card-img" />
          <h2 class="card-title">BREAKFAST & DESSERT</h2>
        </a>
        <a href="food.html" class="image-card">
          <img src="images/borsch.jpg" class="card-img" />
          <h2 class="card-title">LUNCH</h2>
        </a>
        <a href="contact.html" class="image-card">
          <img src="images/window.jpg" class="card-img" />
          <h2 class="card-title">ORDER ONLINE</h2>
        </a>
      </div> 
      

      <!-- Bottom lace -->
      <div class="menu-lace-wrap">
        <img
          src="images/compactLaceBottom.png"
          alt="lace decoration"
          class="menu-lace-bottom"
        />
      </div>
    </section>
    <!-- END page-container -->
   <footer class="footer">
      <div class="footer-contact">emailadress@email.co.uk</div>
      <div class="footer-text">© 2026 Northbound Café & Bakery</div>
    </footer>
  </body>
</html>
