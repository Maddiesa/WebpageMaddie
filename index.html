  <body> <!--page content-->
    <div class="page-container">
    <!-- HERO SECTION, positioning and responsiveness talked about in lectures -->
    <section class="hero"> <!--semantic structure, mentioned in lectures, and so was the img sourcing-->

        src="images/greenery4.jpg"
        alt="greenery background"
        class="hero-bg"
      />
      <img
        src="images/compactLace.png"
        alt="lace decoration"
        class="hero-lace"
      />
      <img
        src="images/KuhlmansNorthMiddle.png"
        alt="Northbound logo"
        class="hero-logo"
      />
      <h1 class="hero-subtitle">café & bakery</h1>

    <!-- MENU SECTION, mentioned flexbox stuff in lectures -->
    <section class="menu-section">
      <div class="content-row">
        <a href="drinks.html" class="image-card">
          <img src="images/teapour.jpg" class="card-img" /> <!--image from Nadin Sh on pexels-->
          <h2 class="card-title">DRINKS</h2>
        </a>
        <a href="brekkie.html" class="image-card">
          <img src="images/syrniki.jpg" class="card-img" /> <!--image from Alina Matveycheva on pexels-->

        </a>

          <img src="images/borsch.jpg" class="card-img" /> <!--image from Nadin Sh on pexels-->
          <h2 class="card-title">LUNCH</h2>
        </a>
        <a href="onlineorder.html" class="image-card">
          <img src="images/window.jpg" class="card-img" /> <!--image from Irina Bekhtereva on pexels-->
          <h2 class="card-title">ORDER ONLINE</h2>
        </a>
      </div> 
      

      <!-- Bottom lace -->
      <div class="menu-lace-wrap">
        <img
          src="images/compactLaceBottom.png" 
          alt="lace decoration"
          class="menu-lace-bottom"
        /> <!--image from adobe stock-->
      </div>
    </section>

   <footer class="footer">
