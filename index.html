<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Northbound</title>

    <link rel="stylesheet" href="northbound.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- hero section -->
    <section class="hero">
      <img
        src="images/greenery4.jpg"
        alt="greenery background"
        class="hero-bg"
      />
<nav class="navbar">
  <ul class="nav-list">
    <li class="nav-item">DRINKS</li>
    <li class="nav-item">BREAKFAST AND DESSERT</li>
    <li class="nav-item">FOOD</li>
    <li class="nav-item">CONTACT AND CATERING</li>
  </ul>
</nav>

      <img
        src="images/compactLace.png"
        alt="lace decoration"
        class="hero-lace"
      />

      <img
        src="images/KuhlmansNorthMiddle.png"
        alt="Northbound logo"
        class="hero-logo"
      />
      <h1 class="hero-subtitle">café & bakery</h1>
    </section>

    <section class="menu-section">
      <div class="content-row">
        <div class="image-card">
          <img src="images/teapour.jpg" class="card-img" />
        </div>

        <div class="image-card">
          <img src="images/syrniki.jpg" class="card-img" />
        </div>

        <div class="image-card">
          <img src="images/borsch.jpg" class="card-img" />
        </div>

        <div class="image-card">
          <img src="images/contact.jpg" class="card-img" />
        </div>

      <!-- bottom lace behaves like hero lace -->
      <img
        src="images/compactLaceBottom.png"
        alt="lace decoration"
        class="menu-lace-bottom"
      />
    </section>
    <footer>
      <p class="footer-text">© 2026 Northbound Café & Bakery</p>
  </body>
</html>
