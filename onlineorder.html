<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Northbound</title>

    <link rel="stylesheet" href="orderpage.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zalando+Sans+Expanded:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="data:,">
  </head>

  <body>
      <a href="index.html" class="home-button">Home</a>

    <!-- HERO SECTION -->
    <section class="hero">
      <img
        src="images/greenery4.jpg"
        alt="greenery background"
        class="hero-bg"
      />
      <img
        src="images/compactLace.png"
        alt="lace decoration"
        class="hero-lace"
      />
      <img
        src="images/KuhlmansNorthMiddle.png"
        alt="Northbound logo"
        class="hero-logo"
      />
      <h1 class="hero-subtitle">café & bakery</h1>
    </section>
    <div class="hero-spacer"></div>
<!-- cart button-->
 <div class="cart-toggle-wrap">

 <button id="cart-toggle" class="cart-toggle">your Cart (<span id="cart-count">0</span>)</button>
 <!-- <button id="cart-toggle" onclick="alert('clicked')">
  TEST CLICK
</button> -->
 </div>
  <!-- cart sidebar -->
    <div id="cart-sidebar" class="cart-sidebar">
        <h2>Your Cart:</h2>
        <div id="cart-items"></div>
        <div id="cart-total"></div>
        <button id="clear-cart" class="clear-cart">clear cart</button>
    </div>  

    <!-- ORDER SECTION -->
  <header class="order-navbar">
  <div class="inner-nav">

    <nav class="nav-wrapper">
      <ul class="nav-list">
        <li><a href="#" class="order-nav active" data-tab="hot-drinks">hot drinks</a></li>
        <li><a href="#" class="order-nav" data-tab="cold-drinks">cold drinks</a></li>
        <li><a href="#" class="order-nav" data-tab="brekkie">brekkie</a></li>
        <li><a href="#" class="order-nav" data-tab="dessert">dessert</a></li>
        <li><a href="#" class="order-nav" data-tab="lunch">lunch</a></li>
      </ul>
    </nav>

  </div>
</header> 
<!--Sort and style this better for each category-->
    <main class="tab-container">
      <section class="tab-content active" id="hot-drinks">
        <div class="menu-item">
          <span>Latte</span>
          <span>$3.00</span>
          <button class="add-button" data-name="Latte" data-price="3.00">
            Add to Cart
          </button>
        </div>
        <div class="menu-item">
          <span>Cappuccino</span>
          <span>$4.00</span>
          <button class="add-button" data-name="Cappuccino" data-price="4.00">
            Add to Cart
          </button>
        </div>
        <div class="menu-item">
          <span>Inferno</span>
          <span>$5.00</span>
          <button class="add-button" data-name="Inferno" data-price="5.00">
            Add to Cart
          </button>
          </div>
      </section>

      <section class="tab-content" id="cold-drinks">
        <div class="menu-item">
          <span>Iced latte</span>
          <span>$3.00</span>
          <button class="add-button" data-name="Iced-latte" data-price="3.00">
            Add to Cart
          </button>
      </section>

      <section class="tab-content" id="brekkie">
        <div class="menu-item">
          <span>Syrniki</span>
          <span>$3.00</span>
          <button class="add-button" data-name="Syrniki" data-price="3.00">
            Add to Cart
          </button>
      </section>

      <section class="tab-content" id="dessert"></section>

      <section class="tab-content" id="lunch"></section>
    </main>
    
    <script src="orderscript.js"></script>
  </body>
</html>
